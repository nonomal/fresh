# GraphQL syntax highlighting test
type Query {
  user(id: ID!): User
  users(limit: Int = 10): [User!]!
}

type Mutation {
  createUser(input: CreateUserInput!): User!
}

type User {
  id: ID!
  name: String!
  email: String
  posts: [Post!]!
  createdAt: DateTime!
}

input CreateUserInput {
  name: String!
  email: String!
}

type Post {
  id: ID!
  title: String!
  content: String
  author: User!
}

enum Role {
  ADMIN
  USER
  GUEST
}
