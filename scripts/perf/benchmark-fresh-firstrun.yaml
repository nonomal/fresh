# First-run vs warm-cache cold start.
#
# Defines two Fresh "editors" that are byte-identical except for
# `isolate_user_dirs`. Run the same `cold_start` scenario on both,
# then diff the medians:
#
#   delta = "Fresh (first-run)"_median  -  "Fresh (warm cache)"_median
#
# That delta is the user-perceived cost of work fresh only does the
# first time it sees an empty $XDG_CACHE_HOME (extracting embedded
# plugins, generating ~/.config/fresh/types/*, etc.).
#
# Increase `iterations` for tighter percentiles; the first-run editor
# pays the cost on every iteration (the harness wipes XDG dirs each
# time), so all samples are valid.

iterations: 5
warmup_iterations: 1
pixel_diff_threshold: 5.0
timeout_ms: 2000
cursor_settle_ms: 600

editors:
  - name: "Fresh (first-run)"
    command: "fresh"
    args: ["--no-restore", "testdata/sample.rs"]
    kind: terminal
    terminal_emulator: "alacritty"
    cold_start_timeout_s: 6
    isolate_user_dirs: true

  - name: "Fresh (warm cache)"
    command: "fresh"
    args: ["--no-restore", "testdata/sample.rs"]
    kind: terminal
    terminal_emulator: "alacritty"
    cold_start_timeout_s: 6
    # No isolate_user_dirs: inherits the user's real $HOME, so embedded
    # plugins are extracted on iteration #0 and reused thereafter.

scenarios:
  - cold_start
